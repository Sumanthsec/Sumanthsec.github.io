<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

.th{display:flex;align-items:center;gap:7px;padding:10px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--br)}

.oc{display:grid;gap:10px}.oc2{grid-template-columns:1fr 1fr}.oc3{grid-template-columns:1fr 1fr 1fr}

.cc{display:flex;align-items:center;justify-content:center;gap:0;padding:24px 0;overflow-x:auto}

<script>
// ═══ NAV MAP ═══
const NAV=[
{id:'1',label:'Summary',n:'1'},
{id:'2',label:'Introduction',n:'2'},
{id:'3',label:'Pre-Reqs',n:'3'},
{id:'4',label:'Setting up AWS Accounts',n:'4',ch:[{id:'4.1',label:'AWS Console Access'},{id:'4.2',label:'Create IAM User'},{id:'4.3',label:'Access Using CLI'}]},
{id:'5',label:'Student Environment',n:'5',ch:[{id:'5.1',label:'Setup via Script'},{id:'5.2',label:'Setup via Console'},{id:'5.3',label:'Timezone Errors'}]},
{id:'6',label:'Attack Surface Map',n:'6'},
{id:'7',label:'AWS IAM',n:'7',ch:[{id:'7.0',label:'IAM Architecture'},{id:'7.1',label:'Misconfigurations'},{id:'7.2',label:'Rollback — Recon'},{id:'7.3',label:'Rollback — Exploit'},{id:'7.4',label:'Cognito Exploit'}]},
{id:'8',label:'Cloud Compute',n:'8',ch:[{id:'8.0',label:'EC2 Architecture'},{id:'8.1',label:'SSRF Exploitation'}]},
{id:'9',label:'Serverless',n:'9',ch:[{id:'9.0',label:'Lambda Architecture'},{id:'9.1',label:'Lambda Exploitation'}]},
{id:'10',label:'Cloud-Nuke',n:'10',ch:[{id:'10.0',label:'Nuke Execution'}]},
{id:'11',label:'Kill Chain',n:'11'}
];
const FLAT=[];NAV.forEach(s=>{if(s.ch)s.ch.forEach(c=>FLAT.push(c.id));else FLAT.push(s.id)});
const PAR={};NAV.forEach(s=>{if(s.ch)s.ch.forEach(c=>PAR[c.id]=s.id)});
const ACC={'1':{d:'none',l:'No Access',b:''},'2':{d:'none',l:'No Access',b:''},'3':{d:'none',l:'No Access',b:''},'4.1':{d:'none',l:'Setting Up',b:''},'4.2':{d:'auth',l:'Authenticated',b:'IAM user created'},'4.3':{d:'auth',l:'Authenticated',b:'CLI configured'},'5.1':{d:'auth',l:'Authenticated',b:''},'5.2':{d:'auth',l:'Authenticated',b:''},'5.3':{d:'auth',l:'Authenticated',b:''},'6':{d:'limited',l:'Read-Only IAM',b:'iam:Get*, iam:List*'},'7.0':{d:'limited',l:'Read-Only IAM',b:'iam:Get*, iam:List*\niam:SetDefaultPolicyVersion'},'7.1':{d:'limited',l:'Read-Only IAM',b:''},'7.2':{d:'limited',l:'Read-Only IAM',b:'Running recon'},'7.3':{d:'admin',l:'FULL ADMIN',b:'Action: *, Resource: *'},'7.4':{d:'admin',l:'Admin + Cognito',b:'+ Cognito temp creds'},'8.0':{d:'admin',l:'Admin + Creds',b:'Multiple credential paths'},'8.1':{d:'admin',l:'Admin + EC2 + S3',b:'Stolen EC2 role creds'},'9.0':{d:'admin',l:'Admin + EC2 + S3',b:''},'9.1':{d:'admin',l:'TOTAL TAKEOVER',b:'AdministratorAccess attached'},'10.0':{d:'clean',l:'Cleaning Up',b:''},'11':{d:'clean',l:'Neutralized',b:'All resources destroyed'}};

let S={scr:null,anims:[],cliStep:0,reconStep:0,ssrfStep:0,lamRole:null};
const $=id=>document.getElementById(id);
const $$=(s,p)=>(p||document).querySelectorAll(s);
const dly=ms=>new Promise(r=>{const id=setTimeout(r,ms);S.anims.push(id)});
const clr=()=>{S.anims.forEach(id=>clearTimeout(id));S.anims=[]};
const sj=o=>JSON.stringify(o,null,2).split('\n').map(l=>{let s=l.replace(/ /g,'&nbsp;');s=s.replace(/"([^"]+)":/g,'<span class="jk">"$1"</span>:');s=s.replace(/: "([^"]+)"/g,': <span class="js">"$1"</span>');s=s.replace(/: (\d+)/g,': <span class="jn">$1</span>');s=s.replace(/: (true|false|null)/g,': <span class="jb">$1</span>');return s}).join('<br>');
function aL(tid,t,c){const b=$(tid);if(!b)return;const d=document.createElement('div');d.className=`tl ${c||'out'}`;d.innerHTML=t;b.appendChild(d);b.scrollTop=b.scrollHeight;return d}
async function tL(tid,t,c,sp){sp=sp||12;const b=$(tid);const d=document.createElement('div');d.className=`tl ${c||'out'}`;b.appendChild(d);for(let i=0;i<t.length;i++){d.innerHTML=t.substring(0,i+1);b.scrollTop=b.scrollHeight;await dly(sp)}return d}
function aP(tid,ps,ph,cb,hint){const b=$(tid);const r=document.createElement('div');r.className='tp';r.innerHTML=`<span class="ps">${ps}</span>`;const inp=document.createElement('input');inp.className='tpi';inp.placeholder=ph||'';inp.autocomplete='off';inp.spellcheck=false;r.appendChild(inp);b.appendChild(r);b.scrollTop=b.scrollHeight;inp.focus();inp.addEventListener('keydown',function h(e){if(e.key==='Enter'){e.preventDefault();const v=inp.value.trim()||hint||'';inp.value=v;inp.disabled=true;inp.removeEventListener('keydown',h);if(cb)cb(v)}});return inp}
function toast(m,t){const e=document.createElement('div');e.className=`toast ${t||'info'}`;e.textContent=m;$('tc').appendChild(e);setTimeout(()=>e.remove(),4000)}
function modal(t,b,f){$('mod').innerHTML=`<div class="mod-h"><h2>${t}</h2><button class="mod-x" onclick="cModal()">✕</button></div><div class="mod-b">${b}</div>${f?`<div class="mod-f">${f}</div>`:''}`;$('mov').classList.add('vis')}
function cModal(){$('mov').classList.remove('vis')}

// ═══ SIDEBAR ═══
function buildSB(){
  let h=`<div class="sb-brand"><div class="sb-brand-icon">CV</div><div class="sb-brand-text">Cloud Village Labs<span>RSA Conference</span></div></div>`;
  h+=`<div class="sb-access"><div class="sb-access-label">Access Level</div><div class="sb-access-level"><span class="adot none" id="adot"></span><span id="alvl">No Access</span></div><div class="sb-access-body" id="abdy"></div></div>`;
  h+=`<div class="sb-nav">`;
  NAV.forEach(s=>{
    const has=s.ch&&s.ch.length;
    h+=`<div class="sb-sec"><div class="sb-hdr" data-sid="${s.id}" onclick="${has?`tglSec('${s.id}')`:`nav('${s.id}')`}">`;
    if(s.n)h+=`<span class="num">${s.n}</span>`;
    h+=`<span>${s.label}</span>`;if(has)h+=`<span class="chv">▸</span>`;
    h+=`</div>`;
    if(has){h+=`<div class="sb-ch" data-sch="${s.id}">`;s.ch.forEach(c=>{h+=`<div class="sb-child" data-sid="${c.id}" onclick="nav('${c.id}')">${c.label}</div>`});h+=`</div>`}
    h+=`</div>`;
  });
  h+=`</div>`;
  $('sidebar').innerHTML=h;
}
function tglSec(id){
  const ch=document.querySelector(`[data-sch="${id}"]`);
  const hdr=document.querySelector(`.sb-hdr[data-sid="${id}"]`);
  if(ch){ch.classList.toggle('open');hdr.classList.toggle('open')}
  const sec=NAV.find(s=>s.id===id);
  if(sec&&sec.ch)nav(sec.ch[0].id);
}
function updSB(sid){
  $$('.sb-hdr').forEach(h=>h.classList.remove('active'));
  $$('.sb-child').forEach(c=>c.classList.remove('active'));
  const el=document.querySelector(`.sb-child[data-sid="${sid}"]`)||document.querySelector(`.sb-hdr[data-sid="${sid}"]`);
  if(el)el.classList.add('active');
  const pid=PAR[sid];
  if(pid){
    const hdr=document.querySelector(`.sb-hdr[data-sid="${pid}"]`);
    if(hdr){hdr.classList.add('active');hdr.classList.add('open')}
    const ch=document.querySelector(`[data-sch="${pid}"]`);
    if(ch)ch.classList.add('open');
  }
  const a=ACC[sid]||ACC['1'];
  $('adot').className=`adot ${a.d}`;$('alvl').textContent=a.l;$('abdy').textContent=a.b;
}

// ═══ SCREENS (generated) ═══
function buildScreens(){
  const m=$('main');
  m.innerHTML = SCREEN_HTML;
}

// ═══ NAV ═══
function nav(id){
  if(id===S.scr)return;clr();
  const oid=S.scr;
  if(oid){const o=document.querySelector(`#main .scr[data-id="${oid}"]`);if(o)o.classList.remove('active')}
  const n=document.querySelector(`#main .scr[data-id="${id}"]`);
  if(!n)return;
  n.classList.add('active');S.scr=id;updSB(id);
  const idx=FLAT.indexOf(id);$('topbar-fill').style.width=((idx+1)/FLAT.length*100)+'%';
  initScr(id);
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  const i=FLAT.indexOf(S.scr);
  if(e.key==='ArrowRight'&&i<FLAT.length-1)nav(FLAT[i+1]);
  else if(e.key==='ArrowLeft'&&i>0)nav(FLAT[i-1]);
});

function cntUp(scope){
  $$(scope+' .mv[data-count]').forEach(el=>{
    const tgt=+el.dataset.count,st=performance.now();
    (function tk(now){const p=Math.min((now-st)/1200,1);el.textContent=Math.round(tgt*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(tk)})(st);
  });
}

// ═══ SCREEN HTML (all screens) ═══
const ISVG=`<svg viewBox="0 0 40 40"><path d="M20 4L6 12v16l14 8 14-8V12L20 4z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="20" cy="18" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 28c0-3.3 2.7-6 6-6s6 2.7 6 6" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
const ESVG=`<svg viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="20" cy="20" r="6" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
const LSVG=`<svg viewBox="0 0 40 40"><path d="M8 32L16 8h4l5 14h-4l3 10H8z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M24 22l8-14h-4" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
const SSVG=`<svg viewBox="0 0 40 40"><ellipse cx="20" cy="12" rx="12" ry="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 12v16c0 2.2 5.4 4 12 4s12-1.8 12-4V12" fill="none" stroke="currentColor" stroke-width="2"/><ellipse cx="20" cy="20" rx="12" ry="4" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;
const CSVG=`<svg viewBox="0 0 40 40"><rect x="8" y="6" width="24" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="20" cy="16" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M13 28c0-3.9 3.1-7 7-7s7 3.1 7 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>`;

const SCREEN_HTML = `
<div class="scr" data-id="1"><div class="tc" style="margin-top:24px"><div class="badge" style="justify-content:center">RSA Conference · Cloud Village</div><h1 class="ptitle" style="font-size:52px">AWS Cloud Attack Workshop</h1><p class="psub" style="margin:10px auto 44px;max-width:620px">Learn how minor AWS misconfigurations chain into full account compromise — through hands-on attack simulation.</p></div><div class="cg cg4" style="max-width:880px;margin:0 auto 44px"><div class="mc"><div class="mv" data-count="7">0</div><div class="ml">Attack Vectors</div></div><div class="mc"><div class="mv" data-count="5">0</div><div class="ml">AWS Services</div></div><div class="mc"><div class="mv" data-count="1">0</div><div class="ml">Kill Chain</div></div><div class="mc"><div class="mv" data-count="45">0</div><div class="ml">Minutes</div></div></div><div class="arch" style="max-width:880px;margin:0 auto 44px;gap:8px"><div class="an"><div class="ai aws-iam">${ISVG}</div><div class="an-l">IAM</div></div><div class="aarr">→</div><div class="an"><div class="ai aws-cog">${CSVG}</div><div class="an-l">Cognito</div></div><div class="aarr">→</div><div class="an"><div class="ai aws-ec2">${ESVG}</div><div class="an-l">EC2</div></div><div class="aarr">→</div><div class="an"><div class="ai aws-s3">${SSVG}</div><div class="an-l">S3</div></div><div class="aarr">→</div><div class="an"><div class="ai aws-lam">${LSVG}</div><div class="an-l">Lambda</div></div></div><div class="tc"><button class="btn btn1 pulse" onclick="nav('2')">Begin Workshop →</button></div></div>

<div class="scr" data-id="2"><div class="badge">Introduction</div><h1 class="ptitle">Why Cloud Attack Labs?</h1><p class="psub">Cloud breaches are rising. Understanding attack patterns is the first step to building resilient defenses.</p><div class="cg cg3 mb-24"><div class="card tc"><div class="mv" style="font-size:36px" data-count="82">0</div><div class="ml">% of breaches involve cloud (2024)</div></div><div class="card tc"><div class="mv" style="font-size:36px" data-count="45">0</div><div class="ml">% caused by IAM misconfig</div></div><div class="card tc"><div class="mv" style="font-size:36px" data-count="12">0</div><div class="ml">avg min to full takeover</div></div></div><div class="cpan"><div class="cp knows"><div class="cp-label">What the Attacker Starts With</div><ul><li>Low-privilege AWS credentials</li><li>AWS CLI access</li><li>Knowledge of common misconfigurations</li></ul></div><div class="cp wants"><div class="cp-label">What the Attacker Wants</div><ul><li>Full <code>AdministratorAccess</code></li><li>Sensitive data from S3</li><li>Persistent backdoor access</li></ul></div></div><div class="callout insight"><strong>Workshop Approach:</strong> Each module uses CloudGoat — an open-source "vulnerable by design" AWS deployment tool by Rhino Security Labs.</div><div class="mt-24"><button class="btn btn1" onclick="nav('3')">Setup Pre-Reqs →</button></div></div>

<div class="scr" data-id="3"><div class="badge">Prerequisites</div><h1 class="ptitle">Setting up Pre-Reqs</h1><p class="psub">Verify your environment has the required tools.</p><div class="cg cg2" style="max-width:800px"><div class="card"><h4>AWS CLI v2</h4><p style="font-size:13px;color:var(--tm)">Command-line interface for AWS</p><button class="btn btng btns mt-12" onclick="chkPre('aws')">Verify →</button><div class="mt-8" id="pre-aws"></div></div><div class="card"><h4>Python 3.x</h4><p style="font-size:13px;color:var(--tm)">Required for CloudGoat and boto3</p><button class="btn btng btns mt-12" onclick="chkPre('py')">Verify →</button><div class="mt-8" id="pre-py"></div></div><div class="card"><h4>Terraform</h4><p style="font-size:13px;color:var(--tm)">Infrastructure provisioning (optional)</p><button class="btn btng btns mt-12" onclick="chkPre('tf')">Verify →</button><div class="mt-8" id="pre-tf"></div></div><div class="card"><h4>Git</h4><p style="font-size:13px;color:var(--tm)">Clone repositories</p><button class="btn btng btns mt-12" onclick="chkPre('git')">Verify →</button><div class="mt-8" id="pre-git"></div></div></div><div class="mt-30"><button class="btn btn1" onclick="nav('4.1')">Setup AWS Accounts →</button></div></div>

<div class="scr" data-id="4.1"><div class="badge">Setting up AWS Accounts</div><h1 class="ptitle">Access to AWS Console</h1><p class="psub">Log in to the AWS Management Console. Use an IAM user — never the root account.</p><div class="split"><div class="card"><h3>Console Access</h3><p style="font-size:14px;color:var(--t2)">The web-based interface for managing your AWS account.</p><div class="callout warning mt-16"><strong>Security:</strong> Root accounts have unrestricted access. Always create a dedicated IAM admin user.</div><button class="btn btn1 mt-16" onclick="nav('4.2')">Create IAM User →</button></div><div class="card" style="background:var(--bg3)"><h4 class="mb-12" style="color:var(--b)">Root vs IAM User</h4><div style="font-size:13px;color:var(--t2);line-height:1.7"><div class="mb-8"><strong style="color:var(--r)">Root</strong> — Full unrestricted access. Cannot be limited by policies.</div><div><strong style="color:var(--g)">IAM User</strong> — Permissions controlled by policies. Can be scoped, rotated, disabled.</div></div></div></div></div>

<div class="scr" data-id="4.2"><div class="badge">Setting up AWS Accounts</div><h1 class="ptitle">Create IAM Admin User</h1><p class="psub">Create a dedicated admin user with programmatic and console access.</p><div class="split"><div><div class="card mb-16"><div class="mb-16"><label class="flbl">Username</label><input class="fi" id="iam-u" placeholder="e.g. iamadmin" autocomplete="off"><div class="ferr" id="iam-u-e">Username is required</div></div><div class="mb-16"><label class="flbl">Attach Policy</label><select class="fsel" id="iam-pol"><option value="">Select policy...</option><option value="AdministratorAccess">AdministratorAccess (Full)</option><option value="PowerUserAccess">PowerUserAccess (No IAM)</option><option value="ReadOnlyAccess">ReadOnlyAccess</option></select></div><div class="epan" id="iam-pol-e"><h4>Insufficient Permissions</h4><p id="iam-pol-em"></p><div class="fix">Select <strong>AdministratorAccess</strong> to continue.</div></div><button class="btn btn1" onclick="mkIAM()">Create User →</button></div><div class="callout danger" style="display:none" id="adm-w"><strong>Production Warning:</strong> AdministratorAccess grants unrestricted access. Use only for workshop purposes.</div></div><div><div class="term"><div class="th"><div class="td r"></div><div class="td y"></div><div class="td g"></div><span class="tt">AWS IAM</span></div><div class="tb2" id="t42"><span style="color:var(--td);font-style:italic">Waiting for input...</span></div></div></div></div></div>

<div class="scr" data-id="4.3"><div class="badge">Setting up AWS Accounts</div><h1 class="ptitle">Access Using AWS CLI</h1><p class="psub">Configure credentials and verify your identity.</p><div class="split"><div><div class="card mb-16"><h4>Your Credentials</h4><div class="mt-12" style="font-size:13px;font-family:var(--mono);color:var(--t2);line-height:2">Access Key ID: <span style="color:var(--g)">AKIAIOSFODNN7EXAMPLE</span><br>Secret Key: <span style="color:var(--g)">wJalrXUtnFEMI/K7MDENG/bPx</span></div><div class="mt-12" style="font-size:12px;color:var(--td)">Type each value into the terminal.</div></div><div class="callout insight">Credentials stored in <code>~/.aws/credentials</code>. Use region <code>us-east-1</code> and output <code>json</code>.</div></div><div><div class="term focus"><div class="th"><div class="td r"></div><div class="td y"></div><div class="td g"></div><span class="tt">terminal — aws configure</span></div><div class="tb2" id="t43"></div><div class="thint" id="cli-h"><span class="hk">↵</span> submit <span style="margin-left:auto">Suggested: <span class="hc" id="cli-hc" onclick="cliHint()"></span></span></div></div></div></div></div>

<div class="scr" data-id="5.1"><div class="badge">Student Environment</div><h1 class="ptitle">Setup Attacker Machine via Script</h1><p class="psub">Deploy vulnerable lab infrastructure using CloudGoat.</p><div class="split"><div class="card"><h3>Automated Deployment</h3><p style="font-size:13px;color:var(--t2)" class="mb-16">Clones CloudGoat, provisions all vulnerable infrastructure automatically.</p><div class="callout warning mt-16"><strong>Cost Notice:</strong> Lab resources incur charges. Run cleanup when finished.</div><button class="btn btn1 mt-16" onclick="runSetup()">Run Setup →</button></div><div><div class="term"><div class="th"><div class="td r"></div><div class="td y"></div><div class="td g"></div><span class="tt">terminal — setup</span></div><div class="tb2" id="t51"></div></div></div></div></div>

<div class="scr" data-id="5.3"><div class="badge">Student Environment</div><h1 class="ptitle">Timezone-Based Errors</h1><p class="psub">Fix clock sync issues that cause AWS signature errors.</p><div class="split"><div class="card"><h3>The Problem</h3><p style="font-size:13px;color:var(--t2)">AWS rejects requests if clock is off by >5 minutes: <code>SignatureDoesNotMatch</code></p><h4 class="mt-20">The Fix</h4><div style="font-size:13px;font-family:var(--mono);color:var(--t2);line-height:2;margin-top:8px">sudo apt install ntp<br>sudo ntpdate ntp.ubuntu.com<br>sudo service ntp restart</div></div><div><div class="term"><div class="th"><div class="td r"></div><div class="td y"></div><div class="td g"></div><span class="tt">terminal</span></div><div class="tb2" id="t53"></div></div></div></div><div class="mt-24"><button class="btn btn1" onclick="nav('6')">View Attack Surface →</button></div></div>
