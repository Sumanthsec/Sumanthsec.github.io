<div class="scr" data-id="a2-takeaway">
<div class="badge">Attack 2 — Takeaway</div>
<h1 class="ptitle">Delete Old Versions. Audit Meta-Permissions.</h1>
<p class="psub">Hidden permission state is the attack surface. Not what's active — what's dormant.</p>
<div class="cg cg2 mb-24">
<div class="card"><h4>Lesson 1</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Always delete old policy versions after tightening. If you have 5 versions and only the latest is restrictive, you have <strong>4 dormant escalation paths</strong>.</p></div>
<div class="card"><h4>Lesson 2</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Audit <code>SetDefaultPolicyVersion</code> and <code>CreatePolicyVersion</code> like admin access. These are meta-permissions that let someone <strong>rewrite history</strong>.</p></div>
</div>
<div class="callout insight"><strong>Transition:</strong> Both attacks so far have been about IAM users and policies within an account. But what about application users? What about the identity layer your app hands out to end users? That's where Cognito comes in.</div>
<div class="mt-24"><button class="btn btn1" onclick="nav('a3-what')">Attack 3: Cognito →</button></div>
</div>

<!-- ATTACK 3: WHAT IS COGNITO -->
<div class="scr" data-id="a3-what">
<div class="badge">Attack 3 — Cognito Identity Pool Abuse</div>
<h1 class="ptitle">What is Cognito?</h1>
<p class="psub">AWS's service for managing application user identities. Two parts — and the second one is dangerous.</p>
<div class="cg cg2 mb-24">
<div class="card" style="border-top:3px solid var(--b)"><h4>User Pools</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Authentication. Usernames, passwords, MFA, sign-up. Think of it as a user database for your app.</p></div>
<div class="card" style="border-top:3px solid var(--r)"><h4>Identity Pools</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Take an authenticated user — or an <strong>unauthenticated one</strong> — and hand them <strong>real AWS credentials</strong>. Temporary IAM credentials tied to an IAM role.</p></div>
</div>
<div class="callout danger"><strong>Identity Pools are an identity broker.</strong> They translate "app user" into "AWS principal." That second part is where the attack lives.</div>
<div class="mt-24"><button class="btn btn1" onclick="nav('a3-trust')">The Trust Model →</button></div>
</div>

<!-- ATTACK 3: TRUST MODEL -->
<div class="scr" data-id="a3-trust">
<div class="badge">Attack 3 — The Misconfiguration</div>
<h1 class="ptitle">Allow Unauthenticated Identities</h1>
<p class="psub">When this setting is on, anyone — without logging in at all — can request temporary AWS credentials.</p>
<div class="arch mb-24" style="gap:16px;padding:32px">
<div class="an"><div class="an-s">No credentials</div><div class="an-l" style="color:var(--r)">Anonymous User</div></div>
<div class="aarr atk">→ GetId</div>
<div class="an"><div class="ai aws-cog">${CSVG}</div><div class="an-l">Identity Pool</div><div class="an-s">Unauth enabled</div></div>
<div class="aarr atk">→ GetCredentials</div>
<div class="an vuln"><div class="ai aws-iam">${ISVG}</div><div class="an-l" style="color:var(--r)">Unauth IAM Role</div><div class="an-s" style="color:var(--r)">Overpermissioned</div></div>
</div>
<div class="card mb-24"><h4>The Problem</h4><div style="font-size:14px;color:var(--t2);line-height:1.7;margin-top:8px">The Identity Pool ID is exposed in the app's JavaScript source — it's a client-side identifier, not a secret.<br><br>The <strong>unauth role</strong> was set up during development, given broad access for testing, and never tightened.<br><br>The team configured the <strong>authenticated</strong> role carefully. But the unauth role? It was forgotten.</div></div>
<div class="mt-24"><button class="btn btn1" onclick="nav('a3-exploit')">The Exploit →</button></div>
</div>

<!-- ATTACK 3: EXPLOIT (interactive) -->
<div class="scr" data-id="a3-exploit">
<div class="badge">Attack 3 — The Exploit</div>
<h1 class="ptitle">No Username. No Password. AWS Credentials.</h1>
<p class="psub">Two API calls. Zero authentication. Cognito hands you a badge.</p>
<div class="split"><div>
<div class="card mb-16"><h4>What the Attacker Has</h4><div style="font-size:13px;color:var(--t2);margin-top:8px">Just the Identity Pool ID: <code>us-east-1:a1b2c3d4-e5f6-7890-dead-beefcafe1234</code><br><br>Found in the app's JavaScript source. Not a secret.</div></div>
<div id="a3-creds" class="cbox ok"><h4 style="color:var(--g)">AWS Credentials Obtained — Zero Auth</h4><div style="font-family:var(--mono);font-size:12px;color:var(--tm);line-height:1.8;margin-top:8px">AccessKeyId: <span style="color:var(--a)">ASIAZ3UNAUTH7EXAMPLE</span><br>SecretKey: <span style="color:var(--a)">wJalr+UnauthCognito/K7MDENG</span><br>Token: <span style="color:var(--a)">IQoJb3JpZ2lu...truncated</span></div>
<div class="why-box vis mt-12"><strong>The attacker walked up to the front door and Cognito handed them a badge.</strong> This is identity brokering + weak trust assumptions. The broker is working correctly. The trust decision is the flaw.</div></div>
</div><div>
<div class="term focus"><div class="th"><div class="td r"></div><div class="td y"></div><div class="td g"></div><span class="tt">cognito-exploit</span></div><div class="tb2" id="t-a3"></div>

</div></div>

<!-- ATTACK 3: TAKEAWAY -->
<div class="scr" data-id="a3-takeaway">
<div class="badge">Attack 3 — Takeaway</div>
<h1 class="ptitle">Audit Both Roles. The Pool ID is Not a Secret.</h1>
<p class="psub">Same pattern, different entry point. Anonymous → through Cognito → to an IAM role with real AWS permissions.</p>
<div class="cg cg3 mb-24">
<div class="card"><h4>Lesson 1</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Audit both <strong>authenticated AND unauthenticated</strong> roles. The unauth role is the one people forget.</p></div>
<div class="card"><h4>Lesson 2</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">The Identity Pool ID is <strong>not a secret</strong>. Assume attackers have it. Security comes from role permissions, not obscurity.</p></div>
<div class="card"><h4>Lesson 3</h4><p style="font-size:14px;color:var(--t2);margin-top:8px">Same core pattern: find an identity path through the graph. <strong>Anonymous → Cognito → IAM role</strong>. Graph traversal, different entry point.</p></div>
</div>
<div class="mt-24"><button class="btn btn1" onclick="nav('wrap')">Wrap Up →</button></div>
</div>

<h1 class="ptitle">Three Attacks. One Pattern.</h1>
<p class="psub">Limited principal → misconfigured edge → escalation. No zero-days. No malware. Just identity.</p>
<div class="kcg" id="kc">
<div class="kcp ph-r"><div class="kcl">Attack 1</div><div class="kcln"><div class="kcd"></div></div><div class="kcc"><h4>IAM Privilege Escalation <span class="tag tag-iam" style="margin-left:6px">IAM</span></h4><p>Meta-permission (AttachUserPolicy) → self-granted AdministratorAccess</p></div></div>
<div class="kcp ph-e"><div class="kcl">Attack 2</div><div class="kcln"><div class="kcd"></div></div><div class="kcc"><h4>Policy Version Rollback <span class="tag tag-iam" style="margin-left:6px">IAM</span></h4><p>Dormant v1 with Action:* → SetDefaultPolicyVersion → rewound time</p></div></div>
<div class="kcp ph-s"><div class="kcl">Attack 3</div><div class="kcln"><div class="kcd"></div></div><div class="kcc"><h4>Cognito Identity Pool <span class="tag tag-cog" style="margin-left:6px">Cognito</span></h4><p>Anonymous → unauthenticated role → AWS credentials with zero auth</p></div></div>
</div>
<div class="quote" style="margin-top:24px">"In cloud, your identity configuration IS your security posture. If the permission graph has paths you didn't intend, attackers will find them."</div>
<div class="callout insight mt-24"><strong>Handoff:</strong> Those were the first three attacks — all focused on AWS identity. Next up: what happens when compute services become the stepping stones — EC2 metadata theft, Lambda abuse, and how the same identity graph concept plays out at the service layer.</div>
